<!DOCTYPE html>
<html>
<head>
  <title>Home</title>
  <style>
    body { font-family: Arial; text-align: center; background-color: cadetblue;}
    h2 { color: brown; }
    table {
      margin: 20px auto;
      border-collapse: collapse;
      width: 70%;
      background-color: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      padding: 12px 15px;
      text-align: left;
    }

    th {
      background-color: #007BFF;
      color: white;
      text-transform: uppercase;
      font-size: 14px;
    }

    tr {
      border-bottom: 1px solid #ddd;
    }

    tr:nth-child(even) {
      background-color: #f9f9f9;
    }

    tr:hover {
      background-color: #f1f1f1;
    }
  </style>
</head>
<body>
  <h2>Welcome to the Home Page</h2>
  <p>This is a sample express app</p>


  <h2>Football Players</h2>

  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Team</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>1</td>
        <td>Cristiano Ronaldo</td>
        <td>Al-Nassr</td>
      </tr>
      <tr>
        <td>2</td>
        <td>Lionel Messi</td>
        <td>Inter Miami</td>
      </tr>
      <tr>
        <td>3</td>
        <td>Neymar Jr.</td>
        <td>Al-Hilal</td>
      </tr>
      <tr>
        <td>4</td>
        <td>Kylian Mbappé</td>
        <td>Paris Saint-Germain</td>
      </tr>
      <tr>
        <td>5</td>
        <td>Mohamed Salah</td>
        <td>Liverpool</td>
      </tr>
    </tbody>
  </table>
</body>
</html>
