# buildspec.yml
version: 0.2

phases:
  install:
    commands:
      - npm install
  pre_build:
    commands:
    - echo "Pre Build started on `date`"
  build:
    commands:
      - echo "Build started on `date`"
      - echo "Build step (optional for Node.js)"
  post_build:
    commands:
      - echo "Ready to deploy"